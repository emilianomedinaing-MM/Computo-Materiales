<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Medina Materiales — Cómputo de obras</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;
    --text:#111;--text2:#555;--text3:#888;
    --border:rgba(0,0,0,0.13);--border2:rgba(0,0,0,0.22);
    --blue:#185FA5;--blue-d:#0C447C;
    --radius:10px;--radius-lg:14px;
    --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
      --text:#f0f0f0;--text2:#ababab;--text3:#777;
      --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
    }
  }
  body{background:var(--bg3);color:var(--text);font-family:var(--font);font-size:15px;min-height:100vh;padding:0}
  .app{max-width:680px;margin:0 auto}

  /* HEADER STICKY SAAS */
  .site-header{
    position:sticky;top:0;z-index:100;
    background:rgba(8,8,12,0.92);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:0;
    margin-bottom:1.25rem;
  }
  .header-inner{
    max-width:720px;margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;
    padding:0.7rem 1.25rem;
    gap:12px;
  }
  .header-logo-wrap{display:flex;align-items:center;gap:0}
  .header-logo-wrap img{
    height:44px;
    width:auto;
    object-fit:contain;
    display:block;
    image-rendering:-webkit-optimize-contrast;
    image-rendering:crisp-edges;
  }
  .header-badge{
    display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  }
  .header-badge .app-label{
    font-size:11px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;color:rgba(255,255,255,0.45);
    line-height:1;
  }
  .header-badge .app-pill{
    display:inline-flex;align-items:center;gap:5px;
    background:rgba(24,95,165,0.25);border:1px solid rgba(24,95,165,0.5);
    border-radius:20px;padding:2px 10px;
    font-size:11px;font-weight:500;color:#5ba3e0;line-height:1.4;
  }
  .header-badge .app-pill::before{
    content:'';display:inline-block;
    width:6px;height:6px;border-radius:50%;
    background:#4ade80;box-shadow:0 0 5px #4ade80;
  }
  @media(max-width:420px){
    .header-inner{padding:0.6rem 1rem;}
    .header-logo-wrap img{height:36px;}
    .header-badge .app-label{font-size:10px;}
  }

  /* CARD */
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
  .sec-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:0.75rem}

  /* GRIDS */
  .fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  @media(max-width:480px){.fg2,.fg3{grid-template-columns:1fr 1fr}}
  @media(max-width:360px){.fg2,.fg3{grid-template-columns:1fr}}

  /* FIELDS */
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:12px;color:var(--text2);font-weight:500}
  .field input,.field select{font-size:14px;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);width:100%;outline:none;transition:border-color .15s}
  .field input:focus,.field select:focus{border-color:var(--blue)}
  .hint{font-size:11px;color:var(--text3);margin-top:2px}

  /* TOGGLE SECTION */
  .sec-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:4px 0;user-select:none}
  .sec-toggle .stitle{font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px;color:var(--text)}
  .sec-toggle .stitle svg{flex-shrink:0;opacity:.7}
  .sec-body{padding-top:10px;border-top:0.5px solid var(--border);margin-top:6px}
  .toggle-check{width:18px;height:18px;accent-color:var(--blue);flex-shrink:0;cursor:pointer}

  /* TABS */
  .tabs{display:flex;gap:6px;margin-bottom:1rem}
  .tab{flex:1;padding:9px 10px;font-size:13px;border-radius:var(--radius);cursor:pointer;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);font-family:var(--font);transition:all .15s;text-align:center}
  .tab.active{background:var(--bg);color:var(--text);border-color:var(--border2);font-weight:500}

  /* PROJ ROW */
  .proj-row{display:flex;gap:8px;align-items:center;margin-bottom:1rem}
  .proj-row input{flex:1;font-size:14px;font-weight:500;padding:8px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none}
  .proj-row input:focus{border-color:var(--blue)}

  /* CALC BTN */
  .calc-btn{width:100%;padding:13px;font-size:15px;font-weight:600;cursor:pointer;border-radius:var(--radius);border:none;background:var(--blue);color:#fff;margin-bottom:1rem;font-family:var(--font);transition:background .15s;letter-spacing:.01em}
  .calc-btn:hover{background:var(--blue-d)}
  .calc-btn:active{transform:scale(.99)}

  /* RESULT */
  .sum-note{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--radius);padding:8px 12px;margin-bottom:1rem;border-left:3px solid var(--blue)}
  .res-section{margin-bottom:1.1rem}
  .res-sec-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .res-sec-title svg{opacity:.7}
  .res-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:13.5px;gap:10px}
  .res-row:last-child{border-bottom:none}
  .res-mat{color:var(--text);flex:1}
  .res-note{font-size:11px;color:var(--text3);display:block;margin-top:1px}
  .res-qty{font-weight:600;white-space:nowrap;color:var(--text);background:var(--bg2);padding:2px 8px;border-radius:20px;font-size:13px}

  /* FOOTER BTNS */
  .footer-btns{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}
  .footer-btns button{flex:1;min-width:140px;padding:10px;font-size:13px;cursor:pointer;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-family:var(--font);transition:background .15s}
  .footer-btns button:hover{background:var(--bg3)}
  .footer-btns button svg{vertical-align:-3px;margin-right:5px}

  /* PRINT */
  @media print{
    body{background:#fff;padding:0}
    .site-header{background:#000 !important;position:static;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .tabs,.calc-btn,.footer-btns{display:none!important}
    #tab-dim{display:none!important}
    #tab-res{display:block!important}
    .card,.sec-card{border:0.5px solid #ccc}
    .res-qty{background:#eee;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>

  <!-- MAIN CARD -->
  <div class="card">
    <div class="proj-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="color:var(--text3);flex-shrink:0"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <input type="text" id="projName" placeholder="Nombre del proyecto (ej: Casa Gral. Paz 450)" aria-label="Nombre del proyecto"/>
    </div>

    <div class="tabs">
      <button class="tab active" id="tbtn-dim" onclick="showTab('dim')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px" aria-hidden="true"><path d="M21 6H3"/><path d="M21 12H3"/><path d="M21 18H3"/></svg>
        Dimensiones
      </button>
      <button class="tab" id="tbtn-res" onclick="showTab('res')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        Cómputo
      </button>
    </div>

    <!-- ═══ TAB DIMENSIONES ═══ -->
    <div id="tab-dim">

      <!-- Planta general -->
      <div class="sec-card">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:7px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Planta general
        </div>
        <div class="fg2">
          <div class="field">
            <label for="sup_total">Superficie cubierta total (m²)</label>
            <input type="number" id="sup_total" value="" min="1" inputmode="decimal"/>
            <span class="hint">Total de planta incluyendo muros</span>
          </div>
          <div class="field">
            <label for="alt_muros">Altura de muros (m)</label>
            <input type="number" id="alt_muros" value="" step="0.1" min="2" inputmode="decimal"/>
          </div>
        </div>
      </div>

      <!-- Cimientos -->
      <div class="sec-card">
        <div class="sec-toggle" onclick="toggleSec('cim')">
          <div class="stitle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="14" width="20" height="6" rx="1"/><rect x="6" y="8" width="12" height="6" rx="1"/><rect x="10" y="2" width="4" height="6" rx="1"/></svg>
            Cimientos
          </div>
          <input type="checkbox" class="toggle-check" id="chk-cim" aria-label="Activar cimientos" onclick="event.stopPropagation();toggleSec('cim',this.checked)"/>
        </div>
        <div class="sec-body" id="sec-cim" style="display:none">
          <div class="fg3" style="margin-bottom:8px">
            <div class="field"><label for="viga_long">Long. total vigas (m)</label><input type="number" id="viga_long" value="" inputmode="decimal"/><span class="hint">Perímetro + ejes int.</span></div>
            <div class="field"><label for="viga_ancho">Ancho (m)</label><input type="number" id="viga_ancho" value="" step="0.05" inputmode="decimal"/></div>
            <div class="field"><label for="viga_prof">Profundidad (m)</label><input type="number" id="viga_prof" value="" step="0.05" inputmode="decimal"/></div>
          </div>
          <div class="field">
            <label for="tipo_cim">Tipo de cimiento</label>
            <select id="tipo_cim">
              <option value="hc">Hormigón ciclópeo</option>
              <option value="hh" selected>Hormigón H-21 con hierro</option>
              <option value="pm">Platea de hormigón</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Mampostería -->
      <div class="sec-card">
        <div class="sec-toggle" onclick="toggleSec('mamp')">
          <div class="stitle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="4" width="9" height="6" rx="1"/><rect x="13" y="4" width="9" height="6" rx="1"/><rect x="2" y="14" width="9" height="6" rx="1"/><rect x="13" y="14" width="9" height="6" rx="1"/></svg>
            Mampostería
          </div>
          <input type="checkbox" class="toggle-check" id="chk-mamp" aria-label="Activar mampostería" onclick="event.stopPropagation();toggleSec('mamp',this.checked)"/>
        </div>
        <div class="sec-body" id="sec-mamp" style="display:none">
          <div class="fg2" style="margin-bottom:8px">
            <div class="field"><label for="muro_long">Long. total de muros (m)</label><input type="number" id="muro_long" value="" inputmode="decimal"/></div>
            <div class="field">
              <label for="tipo_ladrillo">Tipo de ladrillo</label>
              <select id="tipo_ladrillo">
                <option value="comun">Ladrillo común 18×9×6</option>
                <option value="ceramico" selected>Cerámico hueco 8 cm</option>
                <option value="ceramico12">Cerámico hueco 12 cm</option>
                <option value="bloque">Bloque de hormigón 20 cm</option>
              </select>
            </div>
          </div>
          <div class="fg2">
            <div class="field"><label for="sup_aberturas">Sup. aberturas (m²)</label><input type="number" id="sup_aberturas" value="" inputmode="decimal"/><span class="hint">Puertas + ventanas</span></div>
            <div class="field"><label for="cant_col">Columnas de horm. (cant.)</label><input type="number" id="cant_col" value="" inputmode="numeric"/></div>
          </div>
        </div>
      </div>

      <!-- Revoques -->
      <div class="sec-card">
        <div class="sec-toggle" onclick="toggleSec('rev')">
          <div class="stitle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            Revoques
          </div>
          <input type="checkbox" class="toggle-check" id="chk-rev" aria-label="Activar revoques" onclick="event.stopPropagation();toggleSec('rev',this.checked)"/>
        </div>
        <div class="sec-body" id="sec-rev" style="display:none">
          <div class="fg2" style="margin-bottom:8px">
            <div class="field"><label for="rev_ext">Sup. revocar exterior (m²)</label><input type="number" id="rev_ext" value="" inputmode="decimal"/></div>
            <div class="field"><label for="rev_int">Sup. revocar interior (m²)</label><input type="number" id="rev_int" value="" inputmode="decimal"/></div>
          </div>
          <div class="field">
            <label for="tipo_rev">Terminación interior</label>
            <select id="tipo_rev">
              <option value="stuko" selected>Revoque fino a la cal — stuko (bolsa 25 kg)</option>
              <option value="yeso">Yeso proyectable (bolsa 25 kg)</option>
              <option value="cemento">Revoque fino cemento (bolsa 25 kg)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Pisos -->
      <div class="sec-card">
        <div class="sec-toggle" onclick="toggleSec('piso')">
          <div class="stitle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="2" width="9" height="9"/><rect x="13" y="2" width="9" height="9"/><rect x="2" y="13" width="9" height="9"/><rect x="13" y="13" width="9" height="9"/></svg>
            Contrapisos y pisos
          </div>
          <input type="checkbox" class="toggle-check" id="chk-piso" aria-label="Activar pisos" onclick="event.stopPropagation();toggleSec('piso',this.checked)"/>
        </div>
        <div class="sec-body" id="sec-piso" style="display:none">
          <div class="fg2">
            <div class="field"><label for="sup_piso">Superficie de pisos (m²)</label><input type="number" id="sup_piso" value="" inputmode="decimal"/></div>
            <div class="field">
              <label for="tipo_piso">Tipo de piso</label>
              <select id="tipo_piso">
                <option value="ceramica">Cerámica 35×35</option>
                <option value="porcelanato" selected>Porcelanato 60×60</option>
                <option value="microcemento">Microcemento</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Cubierta -->
      <div class="sec-card">
        <div class="sec-toggle" onclick="toggleSec('cub')">
          <div class="stitle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
            Cubierta / techo
          </div>
          <input type="checkbox" class="toggle-check" id="chk-cub" aria-label="Activar cubierta" onclick="event.stopPropagation();toggleSec('cub',this.checked)"/>
        </div>
        <div class="sec-body" id="sec-cub" style="display:none">
          <div class="fg2">
            <div class="field"><label for="sup_techo">Superficie de techo (m²)</label><input type="number" id="sup_techo" value="" inputmode="decimal"/><span class="hint">Incluir aleros</span></div>
            <div class="field">
              <label for="tipo_techo">Tipo de cubierta</label>
              <select id="tipo_techo">
                <option value="chapa">Chapa galvanizada sinusoidal</option>
                <option value="teja" selected>Teja cerámica española</option>
                <option value="losa">Losa con membrana asfáltica</option>
                <option value="fibrocemento">Placa fibrocemento</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Sanitaria -->
      <div class="sec-card">
        <div class="sec-toggle" onclick="toggleSec('san')">
          <div class="stitle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2v6m0 0C9 8 6 10 6 14a6 6 0 0012 0c0-4-3-6-6-6z"/></svg>
            Sanitaria
          </div>
          <input type="checkbox" class="toggle-check" id="chk-san" aria-label="Activar sanitaria" onclick="event.stopPropagation();toggleSec('san',this.checked)"/>
        </div>
        <div class="sec-body" id="sec-san" style="display:none">
          <div class="fg3">
            <div class="field"><label for="cant_ban">Baños completos</label><input type="number" id="cant_ban" value="" min="0" inputmode="numeric"/></div>
            <div class="field"><label for="cant_coc">Cocina / lavadero</label><input type="number" id="cant_coc" value="" min="0" inputmode="numeric"/></div>
            <div class="field"><label for="long_col">Long. colectora (m)</label><input type="number" id="long_col" value="" inputmode="decimal"/></div>
          </div>
        </div>
      </div>

      <!-- Eléctrica -->
      <div class="sec-card">
        <div class="sec-toggle" onclick="toggleSec('elec')">
          <div class="stitle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Instalación eléctrica
          </div>
          <input type="checkbox" class="toggle-check" id="chk-elec" aria-label="Activar eléctrica" onclick="event.stopPropagation();toggleSec('elec',this.checked)"/>
        </div>
        <div class="sec-body" id="sec-elec" style="display:none">
          <div class="fg2">
            <div class="field"><label for="cant_amb">Cantidad de ambientes</label><input type="number" id="cant_amb" value="" min="1" inputmode="numeric"/></div>
            <div class="field"><label for="bocas_amb">Bocas aprox. por ambiente</label><input type="number" id="bocas_amb" value="" min="1" inputmode="numeric"/></div>
          </div>
        </div>
      </div>

      <button class="calc-btn" onclick="calcular()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:6px" aria-hidden="true"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
        Calcular materiales
      </button>
    </div><!-- end tab-dim -->

    <!-- ═══ TAB RESULTADO ═══ -->
    <div id="tab-res" style="display:none"></div>

  </div><!-- end .card -->
</div></div><!-- end .app -->

<script>
const D=1.10;
function bol25(kg){return Math.ceil(kg/25);}
function showTab(t){
  document.getElementById('tab-dim').style.display=t==='dim'?'block':'none';
  document.getElementById('tab-res').style.display=t==='res'?'block':'none';
  document.getElementById('tbtn-dim').classList.toggle('active',t==='dim');
  document.getElementById('tbtn-res').classList.toggle('active',t==='res');
}
function toggleSec(id,force){
  const c=document.getElementById('chk-'+id);
  const b=document.getElementById('sec-'+id);
  if(force===undefined)c.checked=!c.checked;
  b.style.display=c.checked?'block':'none';
}
function n(id){return parseFloat(document.getElementById(id).value)||0;}
function s(id){return document.getElementById(id).value;}
function chk(id){return document.getElementById('chk-'+id).checked;}

function calcular(){
  const res={};
  function add(sec,mat,qty,unit,nota){
    if(!res[sec])res[sec]=[];
    const ex=res[sec].find(r=>r.mat===mat&&r.unit===unit);
    if(ex)ex.qty+=qty; else res[sec].push({mat,qty,unit,nota:nota||''});
  }

  /* CIMIENTOS */
  if(chk('cim')){
    const vol=n('viga_long')*n('viga_ancho')*n('viga_prof');
    const tipo=s('tipo_cim');
    if(tipo==='hc'){
      add('Cimientos','Cemento Portland (bolsa 25 kg)',bol25(vol*180*D),'bolsa','~180 kg/m³ hormigón ciclópeo');
      add('Cimientos','Arena gruesa',parseFloat((vol*0.5*D).toFixed(2)),'m³');
      add('Cimientos','Piedra partida 6/20',parseFloat((vol*0.85).toFixed(2)),'m³','Incluye piedra ciclópea');
    } else if(tipo==='hh'){
      add('Cimientos','Cemento Portland (bolsa 25 kg)',bol25(vol*300*D),'bolsa','~300 kg/m³ — H-21');
      add('Cimientos','Arena gruesa',parseFloat((vol*0.55*D).toFixed(2)),'m³');
      add('Cimientos','Piedra partida 6/20',parseFloat((vol*0.75).toFixed(2)),'m³');
      add('Cimientos','Hierro Ø12 mm (varilla 12 m)',Math.ceil(n('viga_long')*4*1.05),'unidad','4 long. + 5% empalmes');
      const pe=(n('viga_ancho')*2+n('viga_prof')*2)+0.2;
      add('Cimientos','Hierro Ø8 mm (varilla 12 m)',Math.ceil(n('viga_long')/0.2*pe/12*D),'unidad','Estribos c/20 cm');
      add('Cimientos','Alambre recocido',Math.ceil(n('viga_long')*0.3),'kg');
    } else {
      const vP=n('sup_total')*0.15;
      add('Cimientos','Cemento Portland (bolsa 25 kg)',bol25(vP*300*D),'bolsa','Platea e=15 cm — H-21');
      add('Cimientos','Arena gruesa',parseFloat((vP*0.55).toFixed(2)),'m³');
      add('Cimientos','Piedra partida 6/20',parseFloat((vP*0.75).toFixed(2)),'m³');
      add('Cimientos','Hierro Ø10 mm malla',Math.ceil(n('sup_total')*7.85*D),'kg','Malla c/20 cm doble sentido');
      add('Cimientos','Alambre recocido',Math.ceil(n('sup_total')*0.2),'kg');
    }
    const col=n('cant_col');
    if(col>0){
      add('Cimientos','Hierro Ø12 mm (varilla 12 m)',Math.ceil(col*4*n('alt_muros')/12*D),'unidad','Columnas 4Ø12');
      add('Cimientos','Hierro Ø6 mm (varilla 12 m)',Math.ceil(col*n('alt_muros')/0.2*0.8/12*D),'unidad','Estribos col. c/20 cm');
    }
  }

  /* MAMPOSTERÍA */
  if(chk('mamp')){
    const supM=n('muro_long')*n('alt_muros')-n('sup_aberturas');
    const rTab={comun:37,ceramico:16,ceramico12:14,bloque:12.5};
    const nTab={comun:'Ladrillo común 18×9×6',ceramico:'Ladrillo cerámico hueco 8 cm',ceramico12:'Ladrillo cerámico hueco 12 cm',bloque:'Bloque de hormigón 20 cm'};
    const t=s('tipo_ladrillo');
    add('Mampostería',nTab[t],Math.ceil(supM*rTab[t]*D),'unidad',rTab[t]+' un./m²');
    add('Mampostería','Cemento de albañilería (bolsa 25 kg)',bol25(supM*4*D),'bolsa','Mortero asiento 1:4 c/arena');
    add('Mampostería','Arena gruesa',parseFloat((supM*0.02*D).toFixed(2)),'m³','Mortero de asiento');
    const lE=n('muro_long');
    add('Mampostería','Cemento Portland (bolsa 25 kg)',bol25(lE*0.03*150*D),'bolsa','Hormigón viga encadenada sup.');
    add('Mampostería','Arena gruesa',parseFloat((lE*0.03*0.55).toFixed(2)),'m³','Viga encadenada');
    add('Mampostería','Piedra partida 6/20',parseFloat((lE*0.03*0.75).toFixed(2)),'m³','Viga encadenada');
    add('Mampostería','Hierro Ø10 mm (varilla 12 m)',Math.ceil(lE*2/12*D),'unidad','2Ø10 longitudinales');
    add('Mampostería','Hierro Ø6 mm (varilla 12 m)',Math.ceil(lE/0.2*0.6/12*D),'unidad','Estribos c/20 cm');
  }

  /* REVOQUES */
  if(chk('rev')){
    const ext=n('rev_ext'),intr=n('rev_int'),t=s('tipo_rev');
    add('Revoques','Cemento de albañilería (bolsa 25 kg)',bol25(ext*3.5*D),'bolsa','Jaharro exterior e=15 mm');
    add('Revoques','Arena gruesa',parseFloat((ext*0.015*D).toFixed(2)),'m³','Base jaharro exterior');
    add('Revoques','Revoque fino a la cal — stuko (bolsa 25 kg)',Math.ceil(ext/9*D),'bolsa','Terminación exterior ~9 m²/bol');
    add('Revoques','Malla fibra de vidrio (rollo 50 m)',Math.ceil(ext/40),'rollo','Antifisuración bajo stuko');
    add('Revoques','Cemento de albañilería (bolsa 25 kg)',bol25(intr*3.5*D),'bolsa','Jaharro interior e=12 mm');
    add('Revoques','Arena fina',parseFloat((intr*0.012*D).toFixed(2)),'m³','Base jaharro interior');
    if(t==='stuko'){
      add('Revoques','Revoque fino a la cal — stuko (bolsa 25 kg)',Math.ceil(intr/9*D),'bolsa','Terminación interior ~9 m²/bol');
    } else if(t==='yeso'){
      add('Revoques','Yeso proyectable (bolsa 25 kg)',Math.ceil(intr/2.5*D),'bolsa','~2.5 m²/bol');
    } else {
      add('Revoques','Cemento Portland (bolsa 25 kg)',bol25(intr*4*D),'bolsa','Revoque fino cemento e=5 mm');
      add('Revoques','Arena fina',parseFloat((intr*0.008*D).toFixed(2)),'m³','Revoque fino cemento');
    }
  }

  /* PISOS */
  if(chk('piso')){
    const sup=n('sup_piso'),t=s('tipo_piso');
    add('Pisos','Cemento de albañilería (bolsa 25 kg)',bol25(sup*20*D),'bolsa','Contrapiso e=10 cm 1:5');
    add('Pisos','Tosca / cascote',parseFloat((sup*0.09).toFixed(2)),'m³','Relleno contrapiso');
    add('Pisos','Cemento Portland (bolsa 25 kg)',bol25(sup*5.4*D),'bolsa','Carpeta nivelante e=3 cm');
    add('Pisos','Arena fina',parseFloat((sup*0.03*0.55*D).toFixed(2)),'m³','Carpeta');
    if(t==='ceramica'){
      add('Pisos','Cerámica 35×35',Math.ceil(sup*D),'m²','10% desperdicio inc.');
      add('Pisos','Pegamento cerámico (bolsa 25 kg)',Math.ceil(sup/4*D),'bolsa','~4 m²/bolsa');
      add('Pisos','Pastina (bolsa 1 kg)',Math.ceil(sup/8),'bolsa','~8 m²/bolsa');
    } else if(t==='porcelanato'){
      add('Pisos','Porcelanato 60×60',Math.ceil(sup*D),'m²','10% desperdicio inc.');
      add('Pisos','Pegamento porcelanato flex. (bolsa 25 kg)',Math.ceil(sup/3.5*D),'bolsa','~3.5 m²/bolsa');
      add('Pisos','Pastina porcelanato (bolsa 1 kg)',Math.ceil(sup/10),'bolsa','~10 m²/bolsa');
    } else {
      add('Pisos','Kit microcemento (base+color+sellador)',Math.ceil(sup/5),'kit','1 kit cada 5 m²');
      add('Pisos','Lija 120 y 220',2,'pliego');
    }
  }

  /* CUBIERTA */
  if(chk('cub')){
    const sup=n('sup_techo'),t=s('tipo_techo');
    if(t==='chapa'){
      add('Cubierta','Chapa galvanizada sinusoidal C25',Math.ceil(sup*1.12),'m²','12% solape inc.');
      add('Cubierta','Madera pino cepillado 2"×4" (6 m)',Math.ceil(sup/2.5),'unidad','Correas c/60 cm');
      add('Cubierta','Madera pino 3"×4" (6 m)',Math.ceil(sup/8),'unidad','Cabios y soleras');
      add('Cubierta','Tornillo autoperforante 1"',Math.ceil(sup*5),'unidad','~5/m²');
      add('Cubierta','Caballete chapa galv.',Math.ceil(Math.sqrt(sup)*0.15),'metro');
    } else if(t==='teja'){
      add('Cubierta','Teja cerámica española',Math.ceil(sup*16*D),'unidad','16 tejas/m²');
      add('Cubierta','Madera pino 2"×4" (6 m) — latas',Math.ceil(sup/1.5),'unidad','c/33 cm');
      add('Cubierta','Madera pino 3"×5" (6 m) — cabios',Math.ceil(sup/6),'unidad');
      add('Cubierta','Clavo 2.5"',Math.ceil(sup*3/40),'kg','~3 clavos/m²');
      add('Cubierta','Cemento de albañilería (bolsa 25 kg)',bol25(sup*1.5*D),'bolsa','Mortero asiento canaleta');
      add('Cubierta','Arena fina',parseFloat((sup*0.003*D).toFixed(2)),'m³');
    } else if(t==='losa'){
      const vol=sup*0.12;
      add('Cubierta','Cemento Portland (bolsa 25 kg)',bol25(vol*250*D),'bolsa','Losa H-17 e=12 cm');
      add('Cubierta','Arena gruesa',parseFloat((vol*0.55).toFixed(2)),'m³');
      add('Cubierta','Piedra partida 6/20',parseFloat((vol*0.75).toFixed(2)),'m³');
      add('Cubierta','Hierro Ø8 mm (varilla 12 m)',Math.ceil(sup*3.5/12*D),'unidad','Malla Ø8 c/20 cm doble');
      add('Cubierta','Membrana asfáltica 4 mm (rollo 10 m²)',Math.ceil(sup*1.1/10),'rollo','10% solape');
      add('Cubierta','Adhesivo asfáltico en frío',Math.ceil(sup/5),'lt');
      add('Cubierta','Encofrado fenólico 18 mm',Math.ceil(sup*0.5),'m²','Fondo de losa');
    } else {
      add('Cubierta','Placa fibrocemento 6 mm',Math.ceil(sup*1.05),'m²','5% corte');
      add('Cubierta','Madera pino 2"×4" (6 m)',Math.ceil(sup/2.5),'unidad','Estructura soporte');
      add('Cubierta','Tornillo autoperforante 1"',Math.ceil(sup*6),'unidad');
    }
  }

  /* SANITARIA */
  if(chk('san')){
    const ban=n('cant_ban'),coc=n('cant_coc'),col=n('long_col');
    const bD=ban*3+coc*2, lA=(ban+coc)*8;
    add('Sanitaria','Caño PVC cloacal 110 mm',Math.ceil(col*D),'metro','Colectora principal');
    add('Sanitaria','Caño PVC cloacal 75 mm',Math.ceil(bD*2.5*D),'metro','Ramales de descarga');
    add('Sanitaria','Caño PVC cloacal 50 mm',Math.ceil((ban*2+coc)*3),'metro','Ventilaciones y bajadas');
    add('Sanitaria','Caño PVC cloacal 40 mm',Math.ceil((ban+coc)*4),'metro','Desagüe piletas');
    add('Sanitaria','Caño PVC presión 3/4"',Math.ceil(lA*D),'metro','Alimentación fría');
    add('Sanitaria','Caño CPVC 1/2"',Math.ceil((ban+coc)*6*D),'metro','Agua caliente');
    add('Sanitaria','Cemento de contacto PVC 200 cc',Math.ceil(bD*1.5),'unidad');
    add('Sanitaria','Cinta teflón',Math.ceil((ban+coc)*4),'rollo');
    if(ban>0){
      add('Sanitaria','Inodoro + mochila',ban,'juego');
      add('Sanitaria','Bidet',ban,'unidad');
      add('Sanitaria','Lavatorio',ban,'unidad');
      add('Sanitaria','Canilla monocomando lavatorio',ban,'unidad');
      add('Sanitaria','Ducha lluvia + mezcladora',ban,'juego');
      add('Sanitaria','Sifón botella universal',Math.ceil(ban*2),'unidad');
    }
    if(coc>0){
      add('Sanitaria','Pileta de cocina',coc,'unidad');
      add('Sanitaria','Canilla monocomando mesada',coc,'unidad');
    }
  }

  /* ELÉCTRICA */
  if(chk('elec')){
    const amb=n('cant_amb'),bocas=n('bocas_amb'),total=amb*bocas;
    add('Eléctrica','Caño corrugado 3/4" (rollo 50 m)',Math.ceil(total*3/50*D),'rollo','~3 m/boca');
    add('Eléctrica','Cable unipolar 2.5 mm² negro (rollo 100 m)',Math.ceil(total*5/100*D),'rollo','Fase');
    add('Eléctrica','Cable unipolar 2.5 mm² celeste (rollo 100 m)',Math.ceil(total*5/100*D),'rollo','Neutro');
    add('Eléctrica','Cable unipolar 2.5 mm² verde-amarillo (rollo 100 m)',Math.ceil(total*4/100*D),'rollo','Tierra');
    add('Eléctrica','Cable bipolar 4 mm² (rollo 100 m)',Math.ceil(amb*10/100*D),'rollo','Alta demanda');
    add('Eléctrica','Caja rectangular chica',Math.ceil(total*0.7),'unidad');
    add('Eléctrica','Caja cuadrada 100×100',Math.ceil(amb*2),'unidad','Cajas de paso');
    add('Eléctrica','Tablero modular 12 módulos',Math.ceil(amb/3),'unidad');
    add('Eléctrica','Disyuntor 16 A',Math.ceil(total/8),'unidad');
    add('Eléctrica','Llave termomagnética 32 A',1,'unidad','General');
    add('Eléctrica','Toma 2P+T schuko',Math.ceil(total*0.5),'unidad');
    add('Eléctrica','Llave simple / bipolar',Math.ceil(total*0.3),'unidad');
    add('Eléctrica','Caño semipesado 3/4" (6 m)',Math.ceil(amb*3),'unidad','Bajada y acometida');
  }

  /* RENDER */
  const proj=document.getElementById('projName').value||'Proyecto sin nombre';
  const today=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const secIcons={
    Cimientos:'M3 20h18M5 20V10l7-7 7 7v10M9 20v-6h6v6',
    Mampostería:'M2 6h9v6H2zM13 6h9v6h-9zM2 16h9v6H2zM13 16h9v6h-9z',
    Revoques:'M3 5h18v14H3zM3 10h18M8 5v14',
    Pisos:'M2 2h9v9H2zM13 2h9v9h-9zM2 13h9v9H2zM13 13h9v9h-9z',
    Cubierta:'M3 12L12 3l9 9M9 21V12h6v9',
    Sanitaria:'M12 2v6m0 0C9 8 6 10 6 14a6 6 0 0012 0c0-4-3-6-6-6z',
    'Eléctrica':'M13 2 3 14h9l-1 8 10-12h-9l1-8z'
  };

  let html=`<div class="sum-note">Cantidades con 10% de desperdicio incluido. Todas las bolsas en presentación comercial de 25 kg. Verificar con el profesional antes de hacer el pedido.</div>`;
  html+=`<div style="margin-bottom:1rem"><div style="font-size:16px;font-weight:600">${proj}</div><div style="font-size:12px;color:var(--text2);margin-top:3px">Cómputo generado el ${today}</div></div>`;

  Object.keys(res).forEach(sec=>{
    const ic=secIcons[sec]||'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5';
    html+=`<div class="res-section">
      <div class="res-sec-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="${ic}"/></svg>
        ${sec}
      </div>`;
    res[sec].forEach(r=>{
      const q=Math.ceil(r.qty);
      html+=`<div class="res-row">
        <span class="res-mat">${r.mat}${r.nota?'<span class="res-note">'+r.nota+'</span>':''}</span>
        <span class="res-qty">${q} ${r.unit}</span>
      </div>`;
    });
    html+=`</div>`;
  });

  html+=`<div class="footer-btns">
    <button onclick="window.print()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Imprimir / guardar PDF
    </button>
    <button onclick="volver()">
